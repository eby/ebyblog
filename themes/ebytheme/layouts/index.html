{{- define "main" }}
<section>
  <ol class="post-list" reversed>
    {{- range first 20 .Site.RegularPages }}
    <li>
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </li>
    {{- end }}
  </ol>
  <p class="archive-link"><a href="/posts/">all posts →</a></p>
</section>
{{- end }}

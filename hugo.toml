baseURL = "https://ryaneby.com"
title = "Ryan Eby"
theme = "ebytheme"
languageCode = "en-us"

# Pretty URLs: /YYYY/MM/DD/slug/
[permalinks]
  posts = "/:year/:month/:day/:slug/"

# Derive dates from filename for posts without a date field
[frontmatter]
  date = [":filename", ":default"]

# Allow raw HTML in Markdown (needed for WordPress-era posts with inline HTML)
[markup.goldmark.renderer]
  unsafe = true

# Syntax highlighting via CSS classes (no inline styles, no JS)
[markup.highlight]
  noClasses = false
  lineNos = false
  codeFences = true

# RSS at /index.xml, limit to 20 posts
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[services.rss]
  limit = 20

[taxonomies]
  category = "categories"

[params]
  author = "Ryan Eby"

[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 10
